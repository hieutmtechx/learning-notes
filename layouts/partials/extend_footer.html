<button id="cat-btn" aria-label="Toggle cat" title="Toggle cat" onclick="toggleCat()" style="
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  background: var(--entry, #1E2438);
  border: 2px solid #F0B040;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 12px rgba(240,176,64,.35);
  transition: transform .15s, box-shadow .15s;
">🐱</button>

<img id="running-cat" src="/cat.gif" alt="pixel cat">

<style>
  #running-cat {
    display: none;
    position: fixed;
    bottom: 0;
    left: -120px;
    height: 64px;
    image-rendering: pixelated;
    z-index: 998;
    pointer-events: none;
  }
  @keyframes cat-run {
    from { left: -120px; }
    to   { left: 110%; }
  }
  #running-cat.running {
    display: block;
    animation: cat-run 6s linear infinite;
  }
  #cat-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 4px 16px rgba(240,176,64,.5);
  }
</style>

<script>
  function toggleCat() {
    document.getElementById('running-cat').classList.toggle('running');
  }
</script>
